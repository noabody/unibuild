<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg"
     width="512"
     height="512"
     viewBox="0 0 512 512">

  <defs>
    <style>
      .rim {
        fill: #ffffff;
        stroke: #000000;
        stroke-width: 14;
      }

      .major {
        stroke: #000000;
        stroke-width: 12;
        stroke-linecap: square;
      }

      .minor {
        stroke: #000000;
        stroke-width: 8;
        stroke-linecap: square;
      }

      .hour {
        font-family: "Times New Roman", Georgia, serif;
        font-size: 200px;
        fill: #000000;
        dominant-baseline: middle;
        text-anchor: middle;
      }

      .minute {
        font-family: "Times New Roman", Georgia, serif;
        font-size: 240px;
        fill: #000000;
        dominant-baseline: middle;
        text-anchor: middle;
      }
    </style>
  </defs>

  <circle class="rim" cx="256" cy="256" r="230"/>

  <g transform="translate(256 256)">

    <g class="major">
      <line x1="0" y1="-212" x2="0" y2="-190"/>
      <g transform="rotate(90)">
        <line x1="0" y1="-212" x2="0" y2="-190"/>
      </g>
      <g transform="rotate(180)">
        <line x1="0" y1="-212" x2="0" y2="-190"/>
      </g>
      <g transform="rotate(270)">
        <line x1="0" y1="-212" x2="0" y2="-190"/>
      </g>
    </g>

    <g class="minor">
      <g transform="rotate(30)"><line x1="0" y1="-214" x2="0" y2="-195"/></g>
      <g transform="rotate(60)"><line x1="0" y1="-214" x2="0" y2="-195"/></g>
      <g transform="rotate(120)"><line x1="0" y1="-214" x2="0" y2="-195"/></g>
      <g transform="rotate(150)"><line x1="0" y1="-214" x2="0" y2="-195"/></g>
      <g transform="rotate(210)"><line x1="0" y1="-214" x2="0" y2="-195"/></g>
      <g transform="rotate(240)"><line x1="0" y1="-214" x2="0" y2="-195"/></g>
      <g transform="rotate(300)"><line x1="0" y1="-214" x2="0" y2="-195"/></g>
      <g transform="rotate(330)"><line x1="0" y1="-214" x2="0" y2="-195"/></g>
    </g>

    <text class="hour" x="0" y="-64">f</text>

    <g transform="rotate(-45)">
      <text class="minute" x="0" y="124">T</text>
    </g>

    <circle cx="0" cy="0" r="14" fill="#000000" />
  </g>
</svg>
